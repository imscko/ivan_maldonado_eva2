<!DOCTYPE html>
<html lang="es">

<head>
    <!-- Metadatos del documento -->
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Registro - GameCodes</title>
    
    <!-- Google Fonts: Orbitron & Inter -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600&family=Orbitron:wght@500;700;900&display=swap" rel="stylesheet">
    
    <!-- Ícono de la pestaña del navegador (favicon) -->
    <link rel="icon" href="imagenes/iconos o logo/hackerman.ico">
    <!-- Hojas de estilo CSS -->
    <link rel="stylesheet" href="css/styles.css">
    <link rel="stylesheet" href="css/registro.css">
</head>

<body>

    <!-- ============ CONTENIDO DEL REGISTRO ============ -->
    <div class="pagina-registro">

        <!-- Formulario de inscripción (registro de nuevos usuarios) -->
        <!-- El ID "registroForm" se usa en JavaScript para capturar el evento submit -->
        <form id="registroForm" class="formulario-contenedor">
            <h3 class="formulario-titulo">Registro de Usuario</h3>

            <!-- Campo: Usuario -->
            <!-- Cada <label> está vinculado a su <input> mediante el atributo "for" -->
            <label for="usuario" class="formulario-label">Usuario</label>
            <input type="text" id="usuario" class="formulario-campo" placeholder="Ingresa tu usuario" required>

            <!-- Campo: Email -->
            <label for="correoRegistro" class="formulario-label">Correo Electrónico</label>
            <input type="email" id="correoRegistro" class="formulario-campo" placeholder="ejemplo@correo.com" required>

            <!-- Campo: Contraseña -->
            <label for="passwordRegistro" class="formulario-label">Contraseña</label>
            <input type="password" id="passwordRegistro" class="formulario-campo" placeholder="Mín. 8 chars, 1 mayúscula, 1 especial (. ,)" required>

            <!-- Campo: Confirmación de Contraseña -->
            <label for="confirmarPassword" class="formulario-label">Confirmar Contraseña</label>
            <input type="password" id="confirmarPassword" class="formulario-campo" placeholder="Repite tu contraseña" required>

            <button type="submit" class="formulario-boton">Registrarse</button>

            <!-- Contenedor donde se muestran los errores dinámicamente en pantalla -->
            <p id="mensajeRegistro" class="formulario-mensaje"></p>

            <!-- Enlace para volver a la página principal -->
            <div class="formulario-enlace-volver">
                <a href="index.html">← Volver al inicio</a>
            </div>
        </form>

    </div>

    <!-- Script de JavaScript para la validación del registro -->
    <script src="js/registro.js"></script>

</body>

</html>
